name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Version or publish packages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    env:
      NPM_CONFIG_ACCESS: public
      NPM_CONFIG_PROVENANCE: true
    steps:
      # Use CHANGESETS_PAT for checkout so the git remote URL is configured
      # with PAT credentials. When changesets/action later pushes to
      # changeset-release/main, the push is PAT-authored, which makes the
      # bot's PR a "user-equivalent" event and lets ci.yml fire on the
      # pull_request trigger. Without this, the push reuses the default
      # GITHUB_TOKEN credentials set by actions/checkout, GitHub suppresses
      # the downstream workflow, and the required `checks` status never
      # reports on the Version packages PR — leaving it un-mergeable under
      # the main-branch ruleset and forcing a close-and-reopen workaround.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CHANGESETS_PAT }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      # Omit registry-url so setup-node never writes `_authToken=${NODE_AUTH_TOKEN}` unless the
      # job intentionally sets NODE_AUTH_TOKEN (we do not; trusted publishing exchanges the
      # GitHub OIDC token at publish time). Pair that with Changesets releases that understand
      # NPM_TOKEN emptiness (#542, astro release.yml pattern) and npm 11.5.1+.
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install npm CLI for trusted publishing (OIDC)
        run: npm install -g "npm@^11.6.0"
      - run: pnpm install --frozen-lockfile
      - run: pnpm surface:check
      - run: pnpm typecheck
      - run: pnpm test:push
      - run: pnpm test:scripts
      - run: pnpm cli:test
      - run: pnpm cli:smoke:existing
      - name: Pack-and-install smoke
        run: bash scripts/smoke-pack-and-install.sh
      - uses: changesets/action@v1.8.0
        with:
          title: Version packages
          commit: Version packages
          version: pnpm release:version
          publish: pnpm exec changeset publish
        env:
          # CHANGESETS_PAT is a fine-grained Personal Access Token scoped to
          # this repo with Contents: read/write and Pull requests: read/write.
          # Using a PAT instead of the default GITHUB_TOKEN is the documented
          # changesets/action workaround for a GitHub policy: PRs opened or
          # updated by the implicit GITHUB_TOKEN do not trigger downstream
          # workflows (a safeguard against runaway workflow loops). That
          # suppression meant the required `checks` status check from ci.yml
          # never fired on the bot's Version packages PR, leaving it
          # permanently un-mergeable under the main-branch ruleset. A
          # PAT-authored PR is treated like a user-authored PR and does
          # trigger ci.yml.
          #
          # Rotation: GitHub emails the token owner ~7 days before expiry.
          # Regenerate the PAT at https://github.com/settings/personal-access-tokens
          # and update the CHANGESETS_PAT repo secret at
          # https://github.com/glendonC/mobile-surfaces/settings/secrets/actions.
          # The secret name does not change; no workflow edit needed.
          GITHUB_TOKEN: ${{ secrets.CHANGESETS_PAT }}
          # Required spelling for Trusted Publishing on npm: when this secret is **unset**, the
          # action must not synthesize bogus registry auth entries (fixes ENEEDAUTH paths on v1.x).
          # When you **do** set `NPM_TOKEN` at https://github.com/glendonC/mobile-surfaces/settings/secrets/actions
          # use a granular **Automation** token with Publish for `@mobile-surfaces`; read-only
          # granular tokens confuse the OIDC vs token heuristic (changesets/discussions elsewhere).
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
