name: iOS Build

# Compiles the native iOS project: the MobileSurfaces host app AND the
# @bacons/apple-targets widget extension (MobileSurfacesWidget). ci.yml runs
# surface:check and the JS suites, which verify that the Swift attribute
# files MATCH the Zod contract and are byte-identical to their twin
# (MS002/MS003/MS004) - but a Swift file can satisfy every one of those
# static checks and still fail to compile. The whole premise of this project
# is "your code compiles, your push returns 200, and nothing appears": this
# workflow is the half of CI that verifies the compile.
#
# Cost tradeoff: a GitHub-hosted macOS runner is slow (a cold prebuild +
# CocoaPods + xcodebuild is several minutes) and bills at 10x the Linux
# minute rate. To keep it affordable this job is path-filtered to inputs
# that can actually change the native build - the mobile app, the native
# Swift packages, and the workflow itself. A pure docs or JS-contract change
# does not trigger it; ci.yml still runs on every push and PR. It runs on
# pull_request and on push to main so a direct push (or a squash-merge) is
# also covered.

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/live-activity/**'
      - '.github/workflows/ios-build.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/live-activity/**'
      - '.github/workflows/ios-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ios-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-build:
    name: Compile host app and widget extension
    # macos-26 is the GA runner image that ships Xcode 26.x. MS010 requires
    # Xcode major >= 26; macos-latest still resolves to macos-15 (Xcode
    # 16.x), which cannot build this project. Do not move this to
    # macos-latest until macos-latest itself advances to a macOS 26 image.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      # Pin the Xcode major to the version this project commits to. The
      # macos-26 image carries several Xcode 26.x installs with 26.2 as the
      # current default; selecting 26.2 explicitly keeps the build pinned
      # even if GitHub later changes the image default.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # surface-contracts is a workspace dependency of the mobile app and is
      # consumed as built output; build the packages before prebuild reads
      # them. (ci.yml does this via `pnpm typecheck`, which runs `pnpm
      # build` first; this job builds them directly.)
      - run: pnpm build

      # Cache the CocoaPods specs repo and the resolved Pods directory. The
      # generated apps/mobile/ios/Podfile.lock does not exist yet at this point
      # (prebuild produces it below), so the key is built from the committed
      # inputs that actually drive the pod graph: pnpm-lock.yaml (the autolinked
      # native modules) and the live-activity podspec. apps/mobile/ios/ is
      # gitignored and regenerated by prebuild on every run (MS017/MS029), so
      # only the Pods inputs are cached, never the generated project - caching
      # cannot mask a Swift compile failure because xcodebuild always runs
      # fresh below.
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ~/.cocoapods/repos
            apps/mobile/ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('pnpm-lock.yaml', 'packages/live-activity/ios/LiveActivityModule.podspec') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      # expo prebuild generates the gitignored apps/mobile/ios/ from app.json,
      # packages/live-activity/, and apps/mobile/targets/widget/, and runs
      # `pod install` (CocoaPods is preinstalled on the runner), producing
      # MobileSurfaces.xcworkspace with the widget target wired in.
      - name: Prebuild iOS project
        run: pnpm mobile:prebuild:ios

      # Compile the MobileSurfaces scheme against the simulator SDK. The
      # scheme's build action builds the host app target, which declares a
      # PBXTargetDependency on MobileSurfacesWidget, so with implicit
      # dependencies the widget extension is compiled too - a Swift error in
      # either the host app or the widget (the ActivityKit attributes, the
      # Live Activity views, the control widget) fails this step.
      #
      # generic/platform=iOS Simulator builds for the simulator SDK without
      # pinning a specific runtime or booting a device. CODE_SIGNING_ALLOWED
      # / CODE_SIGNING_REQUIRED are NO so no signing identity, provisioning
      # profile, or secrets are needed - this is a compile check, not an
      # archive or a run. apps/mobile/app.json still carries the placeholder
      # appleTeamId, which is fine because signing is disabled here.
      - name: Compile (host app + widget extension)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild build \
            -workspace MobileSurfaces.xcworkspace \
            -scheme MobileSurfaces \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
