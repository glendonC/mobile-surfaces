name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm surface:check
      - run: pnpm typecheck
      - run: pnpm test:push
      - run: pnpm test:scripts
      - run: pnpm cli:test
      - name: Pack-and-install smoke
        # Catches publish-time breakage that no other test surfaces:
        #   - missing entries in `files:` (tar -tzf assertions)
        #   - missing template/template.tgz (because pnpm pack does NOT run
        #     prepublishOnly — easy to break and silent until a downstream
        #     install)
        #   - shebang/permission breakage on bin/index.mjs (--help invocation)
        #   - accidental dependency on workspace-only packages (npm install
        #     from tarball alone)
        #   - broken flag-parsing path through the published binary (--yes
        #     without --name expects USER_ERROR by the #36 ordering)
        #
        # Deliberately does NOT run the binary all the way through to a real
        # scaffold: that would require preflight to pass, which needs Xcode
        # 26+ and iOS 17.2 simulators on the runner. macos-latest currently
        # ships Xcode 16.4. Full scaffold extraction is exercised by
        # cli:test against in-process internals; this smoke covers the
        # tarball boundary, where in-process tests can't see.
        run: |
          set -euo pipefail
          PACK_DIR=$(mktemp -d)
          # cd into the package rather than using `--filter` because pnpm's
          # filter flag implies recursive execution, and `pack` is a
          # single-package command that rejects --recursive in pnpm 10.
          ( cd packages/create-mobile-surfaces \
            && pnpm build:template \
            && pnpm pack --pack-destination "$PACK_DIR" )
          TARBALL=$(echo "$PACK_DIR"/create-mobile-surfaces-*.tgz)

          # Phase 1: tarball contents.
          tar -tzf "$TARBALL" | grep -qx 'package/bin/index.mjs'
          tar -tzf "$TARBALL" | grep -qx 'package/template/template.tgz'
          tar -tzf "$TARBALL" | grep -qx 'package/template/manifest.json'

          # Phase 2: install + invoke via the published bin path.
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          npm init -y >/dev/null
          npm install "$TARBALL"
          BIN=./node_modules/.bin/create-mobile-surfaces

          # --help exits 0 before any preflight or detection.
          "$BIN" --help >/dev/null

          # --yes without --name exits 1 (USER_ERROR) before preflight, by the
          # ordering established in #36. Verifies resolveYesConfig fires
          # through the published binary.
          set +e
          "$BIN" --yes >/dev/null 2>&1
          EXIT=$?
          set -e
          [ "$EXIT" = "1" ] || { echo "expected --yes to exit 1, got $EXIT"; exit 1; }
