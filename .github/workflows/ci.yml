name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm surface:check
      - run: pnpm typecheck
      - run: pnpm site:build
      - run: pnpm test:push
      - run: pnpm test:scripts
      - run: pnpm cli:test
      - run: pnpm cli:smoke
      - run: pnpm cli:smoke:existing
      - run: pnpm cli:smoke:monorepo
      - name: Pack-and-install smoke
        run: bash scripts/smoke-pack-and-install.sh

  scaffold-e2e:
    # Scaffolds a greenfield project into /tmp, then installs and runs
    # surface:check + typecheck inside the scaffold. Catches the class
    # of bug the in-process smokes can't: dep-resolution failure on the
    # generated tree, contract-API drift between template and shipped
    # @mobile-surfaces/* versions, TypeScript regressions at the import
    # boundary. Slow (pnpm install on a fresh tree); runs in its own
    # job so a fail here is a distinct signal from the fast checks.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm cli:smoke:e2e
