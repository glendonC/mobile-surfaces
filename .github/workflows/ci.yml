name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.7.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm surface:check
      - run: pnpm typecheck
      - run: pnpm test:push
      - run: pnpm test:scripts
      - run: pnpm cli:test
      - name: Pack-and-install smoke
        # Catches publish-time breakage that no other test surfaces:
        #   - missing entries in `files:`
        #   - missing template/template.tgz (because pnpm pack does NOT run
        #     prepublishOnly — easy to break and silent until a downstream
        #     install)
        #   - shebang/permission breakage on bin/index.mjs
        #   - accidental dependency on workspace-only packages
        # --no-install keeps the smoke focused on the tarball; the scaffold's
        # own pnpm install + prebuild is exercised by the apps/* jobs.
        run: |
          set -euo pipefail
          PACK_DIR=$(mktemp -d)
          # cd into the package rather than using `--filter` because pnpm's
          # filter flag implies recursive execution, and `pack` is a
          # single-package command that rejects --recursive in pnpm 10.
          ( cd packages/create-mobile-surfaces \
            && pnpm build:template \
            && pnpm pack --pack-destination "$PACK_DIR" )
          INSTALL_DIR=$(mktemp -d)
          cd "$INSTALL_DIR"
          npm init -y >/dev/null
          npm install "$PACK_DIR"/create-mobile-surfaces-*.tgz
          ./node_modules/.bin/create-mobile-surfaces \
            --yes --name=smoke-app \
            --bundle-id=com.acme.smokeapp \
            --no-install
          test -d smoke-app/apps/mobile
          test -f smoke-app/apps/mobile/app.json
          test -f smoke-app/package.json
