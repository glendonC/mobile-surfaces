<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!--
    Open Graph card. Mirrors the deployed expanded-state island so the
    preview matches what visitors actually see: content lives INSIDE the
    dark island, eyebrow/title/tagline are left-aligned, install row is
    centered. Rasterize via `pnpm og` after editing.
  -->

  <!-- Cream stage -->
  <rect width="1200" height="630" fill="#fafaf7"/>

  <!-- Island: 1080×510, centered, radius 44 (mirrors data-state="expanded") -->
  <rect x="60" y="60" width="1080" height="510" rx="44" fill="#0a0a0a"/>

  <!-- Eyebrow: top-left, muted-strong, matches .island-eyebrow -->
  <text x="115" y="130"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="24" font-weight="500"
        fill="#fafaf7" fill-opacity="0.78">Mobile Surfaces</text>

  <!-- Headline: left-aligned, scaled up from the live 30px to billboard 72px -->
  <text x="115" y="245"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="72" font-weight="500"
        letter-spacing="-1.6" fill="#fafaf7">Live Activities for</text>
  <text x="115" y="325"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="72" font-weight="500"
        letter-spacing="-1.6" fill="#fafaf7">Expo iOS.</text>

  <!-- Tagline: left-aligned, muted, trimmed to two lines for thumbnail
       legibility (the live page wraps the same idea over three lines). -->
  <text x="115" y="385"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="24" fill="#fafaf7" fill-opacity="0.55">The fastest way to ship Live Activities, Dynamic Island,</text>
  <text x="115" y="418"
        font-family="Geist, ui-sans-serif, system-ui, sans-serif"
        font-size="24" fill="#fafaf7" fill-opacity="0.55">widgets, and controls on iPhone.</text>

  <!-- Install row: hairline-bg pill, centered, contains the segmented
       picker (npm active) and the install command. Mirrors the live
       .install-row layout. -->
  <g transform="translate(335, 470)">
    <!-- Outer pill -->
    <rect width="530" height="60" rx="20" fill="#fafaf7" fill-opacity="0.07"/>

    <!-- Picker indicator behind 'npm' (active) -->
    <rect x="9" y="9" width="58" height="42" rx="999" fill="#fafaf7" fill-opacity="0.13"/>

    <!-- Picker tabs -->
    <text x="38" y="36"
          font-family="Geist, ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="500"
          fill="#fafaf7" text-anchor="middle">npm</text>
    <text x="98" y="36"
          font-family="Geist, ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="500"
          fill="#fafaf7" fill-opacity="0.55" text-anchor="middle">pnpm</text>
    <text x="155" y="36"
          font-family="Geist, ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="500"
          fill="#fafaf7" fill-opacity="0.55" text-anchor="middle">yarn</text>
    <text x="208" y="36"
          font-family="Geist, ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="500"
          fill="#fafaf7" fill-opacity="0.55" text-anchor="middle">bun</text>

    <!-- Install command -->
    <text x="377" y="38"
          font-family="Geist Mono, ui-monospace, SFMono-Regular, monospace"
          font-size="18" fill="#fafaf7"
          text-anchor="middle">npm create mobile-surfaces</text>
  </g>
</svg>
